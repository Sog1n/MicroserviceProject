server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: product-service
            uri: lb://PRODUCT-SERVICE
            predicates:
              - Path=/api/products,/api/products/**

          - id: user-service
            uri: lb://USER-SERVICE
            predicates:
              - Path=/api/users,/api/users/**,/api/auth,/api/auth/**

          - id: order-service
            uri: lb://ORDER-SERVICE
            predicates:
              - Path=/api/orders,/api/orders/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}

logging:
  level:
    org.springframework.cloud.gateway.mvc: TRACE
    org.springframework.web.servlet: DEBUG